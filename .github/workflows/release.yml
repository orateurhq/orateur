# Release: bump versions, verify build, commit, tag, upload to GitHub Release.
# Actions → Release → Run workflow → enter semver (e.g. 0.1.3). No manual tag required.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to release (e.g. 0.1.3). Must match or bump pyproject.toml version."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver
        run: |
          echo "${{ github.event.inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with origin
        run: git pull --rebase origin "${{ github.event.repository.default_branch }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Sync version across repository
        run: python3 scripts/sync_version_for_release.py "${{ github.event.inputs.version }}"

      - name: Refresh uv.lock
        run: uv lock

      - name: Install build frontend
        run: pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify wheel contains Python package
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path

          whl = next(Path("dist").glob("*.whl"))
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
          py_under_pkg = [n for n in names if n.startswith("orateur/") and n.endswith(".py")]
          assert py_under_pkg, f"{whl} has no orateur/*.py (got {len(names)} entries): {names[:15]}"
          print(f"OK: {whl.name} has {len(py_under_pkg)} orateur/*.py files")
          PY

      - name: Package Quickshell assets
        run: tar -czf quickshell-orateur.tar.gz quickshell

      - name: Versioned install.sh for this release
        run: |
          VERSION="${{ github.event.inputs.version }}"
          cp scripts/install.sh install.sh
          sed -i "s/^DEFAULT_ORATEUR_VERSION=\"\"/DEFAULT_ORATEUR_VERSION=\"${VERSION}\"/" install.sh

      - name: Commit and push version bump
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: release v${{ github.event.inputs.version }}"
            git push origin "HEAD:${{ github.event.repository.default_branch }}"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update branch before tag
        run: git pull --rebase origin "${{ github.event.repository.default_branch }}"

      - name: Create and push tag (if missing)
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "Tag v${VERSION} already exists on origin; skipping tag create."
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            bin/orateur
            install.sh
            quickshell-orateur.tar.gz
