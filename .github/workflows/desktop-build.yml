# Build the Orateur desktop app (Tauri) for macOS and Linux, upload CI artifacts.
# Actions → Desktop build (macOS/Linux) → Run workflow.
#
# Requires repository secret: TAURI_SIGNING_PRIVATE_KEY (same as release signing; see Tauri updater docs).

name: Desktop build (macOS/Linux)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git branch or tag to build (e.g. main or v0.1.3)"
        required: false
        default: "main"
        type: string

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.repository }}-${{ github.event.inputs.ref || 'main' }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build frontend
        working-directory: desktop
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dist
          path: desktop/dist

  desktop:
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            rust_cache_key: macos-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            rust_cache_key: macos-x86_64
          - platform: ubuntu-22.04
            target: ""
            rust_cache_key: linux-x86_64-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: desktop-dist
          path: desktop/dist

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Setup Rust (Linux host)
        if: matrix.platform == 'ubuntu-22.04'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust (macOS cross-target)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: v0-orateur-desktop
          key: ${{ matrix.rust_cache_key }}
          workspaces: desktop/src-tauri -> target

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri
        working-directory: desktop
        env:
          SKIP_FRONTEND_BUILD: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri build -- --target "${{ matrix.target }}"
          else
            npm run tauri build
          fi

      - name: Upload macOS bundles
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: orateur-desktop-${{ matrix.target }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.sig
          if-no-files-found: error

      - name: Upload Linux bundles
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: orateur-desktop-linux-x86_64
          path: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/appimage/*.sig
          if-no-files-found: error
