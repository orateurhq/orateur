name: Semantic Release

# Runs when commits land on main (including PR merges). Verify must pass first.
on:
  push:
    branches:
      - main

jobs:
  verify:
    uses: ./.github/workflows/reusable-verify.yml
    secrets: inherit

  create-release:
    needs: verify
    runs-on: ubuntu-latest
    # Skip when the last push was from Actions (default actor for GITHUB_TOKEN), to avoid release loops.
    # See default env vars: https://docs.github.com/en/actions/reference/workflows-and-actions/variables
    if: github.actor != 'github-actions[bot]'
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      # Uses the workflow GITHUB_TOKEN (no GitHub App). Pushes from this token do not trigger
      # new workflow runs (GitHub limitation). Use a PAT or App if you need that.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Git author: defaults use github.actor / github.actor_id (documented on Variables reference).
      # Optional repo vars CICD_USERNAME / CICD_EMAIL override if you want a fixed release identity.
      - name: Configure Git
        run: |
          git config --global user.name "${GIT_USER_NAME}"
          git config --global user.email "${GIT_USER_EMAIL}"
        env:
          GIT_USER_NAME: ${{ vars.CICD_USERNAME || github.actor }}
          GIT_USER_EMAIL: ${{ vars.CICD_EMAIL || format('{0}+{1}@users.noreply.github.com', github.actor_id, github.actor) }}

      - name: Python Semantic Release
        id: semantic_release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GIT_COMMIT_AUTHOR: ${{ format('{0} <{1}>', vars.CICD_USERNAME || github.actor, vars.CICD_EMAIL || format('{0}+{1}@users.noreply.github.com', github.actor_id, github.actor)) }}
        with:
          github_token: ${{ github.token }}
          git_committer_name: ${{ vars.CICD_USERNAME || github.actor }}
          git_committer_email: ${{ vars.CICD_EMAIL || format('{0}+{1}@users.noreply.github.com', github.actor_id, github.actor) }}

      # `semantic-release version` only uploads `[tool.semantic_release] assets` (e.g. uv.lock).
      # Wheel, sdist, install.sh, quickshell tarball, and bin/orateur come from
      # `[tool.semantic_release.publish] dist_glob_patterns` and require `semantic-release publish`.
      # `uvx` runs PSR in an isolated env (no `uv sync` — avoids torch/CUDA from project deps).
      - uses: astral-sh/setup-uv@v5
        if: steps.semantic_release.outputs.released == 'true'

      - name: Publish release assets (wheel, sdist, install.sh, quickshell, launcher)
        if: steps.semantic_release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --tags origin
          uvx --from python-semantic-release==10.5.3 semantic-release publish --tag "${{ steps.semantic_release.outputs.tag }}"
