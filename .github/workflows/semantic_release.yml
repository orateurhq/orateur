name: Semantic Release

# Runs when commits land on main (including PR merges). Verify must pass first.
on:
  push:
    branches:
      - main

jobs:
  verify:
    uses: ./.github/workflows/reusable-verify.yml
    secrets: inherit

  create-release:
    needs: verify
    runs-on: ubuntu-latest
    if: github.actor != vars.CICD_USERNAME
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      # Uses the workflow GITHUB_TOKEN (no GitHub App). Pushes from this token do not trigger
      # new workflow runs (GitHub limitation). Use a PAT or App if you need that.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "${{ vars.CICD_USERNAME }}"
          git config --global user.email "${{ vars.CICD_EMAIL }}"

      - name: Python Semantic Release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GIT_COMMIT_AUTHOR: ${{ vars.CICD_USERNAME }} <${{ vars.CICD_EMAIL }}>
        with:
          github_token: ${{ github.token }}
          git_committer_name: ${{ vars.CICD_USERNAME }}
          git_committer_email: ${{ vars.CICD_EMAIL }}
