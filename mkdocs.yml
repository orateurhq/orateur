site_name: Orateur Documentation
site_description: Minimal local speech-to-text, text-to-speech, and speech-to-speech assistant
site_author: Antoine
site_url: https://orateurhq.github.io/orateur/
repo_url: https://github.com/orateurhq/orateur
repo_name: orateurhq/orateur

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

copyright: Copyright &copy; Orateur contributors
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/orateurhq/orateur

nav:
  - Home: index.md
  - Reference: reference.md
  - Changelog: CHANGELOG.md
  - GitHub Pages setup: github-pages-setup.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_signature_annotations: true
            show_if_no_docstring: false
            show_bases: true
            show_root_heading: true
            docstring_style: numpy
            merge_init_into_class: true
